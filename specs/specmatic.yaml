version: 2
contracts:
- provides:
  - baseUrl: http://order-bff:8080
    specs:
    - product_search_bff_v5.yaml
  consumes:
  - port: 9090
    specs:
    - proxy_recordings.yaml
  - specs:
    - kafka.yaml
    specType: asyncapi
    config:
      inMemoryBroker:
        host: localhost
        port: 9092
      servers:
        - host: localhost:9092
          protocol: kafka
  - port: 8095
    specs:
    - inventory.wsdl
proxy:
  port: 9090
  targetUrl: http://order-api:8090
  consumes:
  - proxy_recordings.yaml
report:
  types:
    APICoverage:
      OpenAPI:
        successCriteria:
          minThresholdPercentage: 70
          maxMissedEndpointsInSpec: 0
          enforce: true
